{{- if and .Values.inference.enabled .Values.inference.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.inference.name }}
  labels:
    {{- include "stt-bench.labels" . | nindent 4 }}
    app: {{ .Values.inference.name }}
    component: inference
spec:
  ingressClassName: {{ .Values.inference.ingress.className }}
  rules:
    - host: {{ required "inference.ingress.host is required when ingress is enabled" .Values.inference.ingress.host }}
      http:
        paths:
          - path: {{ .Values.inference.ingress.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.inference.name }}
                port:
                  name: http
{{- end }}
