{{- range $key, $gateway := .Values.gateways }}
{{- if $gateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $gateway.name }}
  labels:
    {{- include "stt-bench.labels" $ | nindent 4 }}
    app: {{ $gateway.name }}
    component: gateway
    gateway: {{ $key }}
spec:
  replicas: {{ $gateway.replicas }}
  selector:
    matchLabels:
      app: {{ $gateway.name }}
  template:
    metadata:
      labels:
        app: {{ $gateway.name }}
        component: gateway
        gateway: {{ $key }}
    spec:
      {{- include "stt-bench.imagePullSecrets" $ | nindent 6 }}
      securityContext:
        {{- toYaml $.Values.podSecurityContext | nindent 8 }}
      containers:
        - name: gateway
          image: {{ include "stt-bench.image" (list $ $gateway.image) }}
          imagePullPolicy: {{ $.Values.images.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $gateway.port }}
          env:
            - name: PORT
              value: {{ $gateway.port | quote }}
            {{- range $name, $value := $.Values.gatewayCommonEnv }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $name, $value := $gateway.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          resources:
            {{- toYaml $gateway.resources | nindent 12 }}
          securityContext:
            {{- toYaml $.Values.containerSecurityContext | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $gateway.name }}
  labels:
    {{- include "stt-bench.labels" $ | nindent 4 }}
    app: {{ $gateway.name }}
    component: gateway
    gateway: {{ $key }}
spec:
  type: ClusterIP
  selector:
    app: {{ $gateway.name }}
  ports:
    - name: http
      port: {{ $gateway.port }}
      targetPort: http
---
{{- end }}
{{- end }}
