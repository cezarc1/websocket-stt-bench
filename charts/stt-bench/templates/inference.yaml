{{- if .Values.inference.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.inference.name }}
  labels:
    {{- include "stt-bench.labels" . | nindent 4 }}
    app: {{ .Values.inference.name }}
    component: inference
spec:
  replicas: {{ .Values.inference.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.inference.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.inference.name }}
        component: inference
    spec:
      {{- include "stt-bench.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: inference-server
          image: {{ include "stt-bench.image" (list . .Values.inference.image) }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.inference.port }}
          env:
            - name: PORT
              value: {{ .Values.inference.port | quote }}
            {{- range $name, $value := .Values.inference.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.inference.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.inference.name }}
  labels:
    {{- include "stt-bench.labels" . | nindent 4 }}
    app: {{ .Values.inference.name }}
    component: inference
spec:
  type: {{ .Values.inference.service.type }}
  {{- with .Values.inference.service.externalTrafficPolicy }}
  externalTrafficPolicy: {{ . }}
  {{- end }}
  selector:
    app: {{ .Values.inference.name }}
  ports:
    - name: http
      port: {{ .Values.inference.service.port }}
      targetPort: http
      {{- with .Values.inference.service.nodePort }}
      nodePort: {{ . }}
      {{- end }}
{{- end }}
