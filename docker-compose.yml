  MODEL_DELAY_MS: "75"
  FLUSH_INTERVAL_MS: "1000"
  FLUSH_PHASE_JITTER_MS: "1000"
  PORT: "10000"
  INFERENCE_URL: "http://inference-server:9000"
  MALLOC_ARENA_MAX: "2"

x-typescript-env: &typescript-env
  CPU_PASSES: "4"
  MODEL_DELAY_MS: "75"
