# FLUSH_INTERVAL_MS: gateway-to-inference batch cadence. Clients still upload
# 20 ms PCM frames immediately, but gateways flush larger per-session batches
# to reduce backend request overhead. The primary benchmark profile uses 1000 ms.
#
# FLUSH_PHASE_JITTER_MS: one-time random offset (uniform [0, jitter_ms]) added
# to each session's first scheduled flush; subsequent flushes hold the exact
# FLUSH_INTERVAL_MS cadence. Set it to match FLUSH_INTERVAL_MS so a population
# that connects in a tight loadgen burst spreads evenly across the flush window
# instead of slamming the inference server in lockstep. Code default is 0 so
# unit tests stay deterministic.
x-python-env: &python-env
  CPU_PASSES: "4"
  MODEL_DELAY_MS: "75"
  FLUSH_INTERVAL_MS: "1000"
  FLUSH_PHASE_JITTER_MS: "1000"
  PORT: "8000"
  INFERENCE_URL: "http://inference-server:9000"

x-elixir-env: &elixir-env
  CPU_PASSES: "4"
  MODEL_DELAY_MS: "75"
  FINCH_POOL_COUNT: "50"
  FLUSH_INTERVAL_MS: "1000"
  FLUSH_PHASE_JITTER_MS: "1000"
  PORT: "4000"
  INFERENCE_URL: "http://inference-server:9000"

x-rust-env: &rust-env
  CPU_PASSES: "4"
  MODEL_DELAY_MS: "75"
