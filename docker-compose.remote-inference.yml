# Optional override for benchmarking gateways against an external inference
# server. Set REMOTE_INFERENCE_URL to the inference base URL, then start the
# gateway with `docker compose ... up --no-deps <gateway-service>` so Compose
# does not also start the local inference-server dependency.

x-remote-inference-env: &remote-inference-env
  INFERENCE_URL: "${REMOTE_INFERENCE_URL:?set REMOTE_INFERENCE_URL, e.g. http://192.0.2.10:30900}"

services:
  python-fastapi-stock-single:
    environment:
      <<: *remote-inference-env

  python-fastapi-stock-multi:
    environment:
      <<: *remote-inference-env

  python-fastapi-stock-gil-single:
    environment:
      <<: *remote-inference-env

  python-fastapi-stock-gil-multi:
    environment:
      <<: *remote-inference-env

  python-fastapi-mt-single:
    environment:
      <<: *remote-inference-env

  python-fastapi-mt-multi:
    environment:
      <<: *remote-inference-env

  elixir-phoenix-single:
    environment:
      <<: *remote-inference-env

  elixir-phoenix-multi:
    environment:
      <<: *remote-inference-env

  rust-axum-single:
    environment:
      <<: *remote-inference-env

  rust-axum-multi:
    environment:
      <<: *remote-inference-env
