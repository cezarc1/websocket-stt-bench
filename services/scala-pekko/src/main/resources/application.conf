pekko {
  # SLF4J/logback bridge for Pekko's built-in logging.
  loggers = ["org.apache.pekko.event.slf4j.Slf4jLogger"]
  loglevel = "INFO"
  logging-filter = "org.apache.pekko.event.slf4j.Slf4jLoggingFilter"

  # Per-actor mailbox + dispatcher tuning. Defaults are fine for the benchmark; left here as a
  # touchpoint for tuning once we have the bracket sweep.

  http {
    # Server-side WebSocket settings — defaults are sane for the protocol shape, but we cap
    # idle timeouts to play nicely with the loadgen's per-session timing.
    server {
      # WebSocket benchmarks intentionally hold thousands of concurrent connections.
      # Pekko HTTP defaults are conservative for general servers (1024 max connections,
      # backlog 100), which turns high-session runs into connection-admission failures
      # before the gateway actor path is saturated.
      max-connections = 8192
      backlog = 8192
      idle-timeout = 60 s
      request-timeout = 30 s
      websocket {
        # Pekko HTTP 1.3 accepts only ping/pong keepalive modes. Use a long interval so this
        # stays out of the benchmark hot path while keeping the server config valid.
        periodic-keep-alive-mode = ping
        periodic-keep-alive-max-idle = 55 s
      }
    }

    # Outbound HTTP/2 client (used by JdkHttpInferenceClient via JDK HttpClient instead — these
    # settings are kept for any future migration to pekko-http's HTTP/2 client with h2c prior
    # knowledge).
    client.http2 {
      max-concurrent-streams = 512
    }
  }
}
